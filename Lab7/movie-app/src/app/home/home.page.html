<!-- List movies using the list template for ion cards -->
<!-- https://ionicframework.com/docs/api/card -->

@for (m of shrekMovies; track m) {
<ion-card>
  <ion-card-content>
    <ion-list>
        <ion-item>
          <ion-thumbnail slot="start">
            <img alt="Shrek_Poster" src={{m.Poster}} />
          </ion-thumbnail>
          <ion-label>{{m.Title}}</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
}

</ion-content>
